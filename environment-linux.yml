# yakRNA Design Environment - Linux with CUDA
# For macOS / CPU, use environment-macos.yml

name: yakrna
channels:
  - pytorch
  - nvidia
  - conda-forge
  - nodefaults
dependencies:
  - python=3.10
  - pytorch>=2.1.0
  - pytorch-cuda>=12.1
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.11
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - seaborn>=0.12
  - tqdm>=4.65
  - pyyaml>=6.0
  - h5py>=3.8
  - pip
  - pip:
    - transformers>=4.40.0
    - accelerate>=0.30.0
    - biopython>=1.83
    - huggingface_hub>=1.0.0
